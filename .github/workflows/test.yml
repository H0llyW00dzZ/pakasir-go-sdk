name: 🧪 Test Coverage

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.ignore'
      - '.github/dependabot.yml'
      - '**/docs.go'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.ignore'
      - '.github/dependabot.yml'
      - '**/docs.go'

jobs:
  coverage:
    name: 🔢 Test Coverage on ${{ matrix.os }} (Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, ubuntu-24.04-arm, ubuntu-22.04-arm, macos-latest, windows-latest, windows-2022, windows-11-arm]
        go-version: ['1.26.0', '1.26.1']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Run go vet
      run: go vet ./src/...
      shell: bash

    - name: Run tests with coverage (with race detector)
      if: ${{ matrix.os != 'windows-11-arm' }}
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic $(go list ./src/... | grep -v /grpc/pakasir/)
      shell: bash

    - name: Run tests with coverage (without race detector)
      if: ${{ matrix.os == 'windows-11-arm' }}
      run: go test -v -coverprofile=coverage.txt -covermode=atomic $(go list ./src/... | grep -v /grpc/pakasir/)
      shell: bash

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      if: ${{ matrix.os == 'ubuntu-latest' }}
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        files: ./coverage.txt
        flags: unittests
        name: codecov-umbrella

