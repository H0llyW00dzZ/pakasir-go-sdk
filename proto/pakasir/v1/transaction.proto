syntax = "proto3";

package pakasir.v1;

import "pakasir/v1/types.proto";

option go_package = "github.com/H0llyW00dzZ/pakasir-go-sdk/src/grpc/pakasir/v1;pakasirv1";

// TransactionService provides gRPC access to the Pakasir transaction API.
//
// This service mirrors the transaction operations exposed by the Go SDK,
// allowing developers to wrap Pakasir functionality in their gRPC backends.
service TransactionService {
  // Create creates a new payment transaction.
  rpc Create(CreateRequest) returns (CreateResponse) {}

  // Cancel cancels an existing transaction.
  rpc Cancel(CancelRequest) returns (CancelResponse) {}

  // Detail retrieves the details of a transaction.
  rpc Detail(DetailRequest) returns (DetailResponse) {}
}

// CreateRequest is the request to create a new transaction.
message CreateRequest {
  // order_id is the unique order identifier.
  string order_id = 1;

  // amount is the payment amount in the smallest currency unit.
  int64 amount = 2;

  // payment_method is the desired payment method.
  PaymentMethod payment_method = 3;
}

// CreateResponse is the response after creating a transaction.
message CreateResponse {
  // payment contains the created payment details.
  PaymentInfo payment = 1;
}

// CancelRequest is the request to cancel an existing transaction.
message CancelRequest {
  // order_id is the unique order identifier.
  string order_id = 1;

  // amount is the transaction amount for verification.
  int64 amount = 2;
}

// CancelResponse is the response after cancelling a transaction.
message CancelResponse {}

// DetailRequest is the request to retrieve transaction details.
message DetailRequest {
  // order_id is the unique order identifier.
  string order_id = 1;

  // amount is the transaction amount for verification.
  int64 amount = 2;
}

// DetailResponse is the response containing transaction details.
message DetailResponse {
  // transaction contains the transaction details.
  TransactionInfo transaction = 1;
}
