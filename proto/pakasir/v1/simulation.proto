syntax = "proto3";

package pakasir.v1;

option go_package = "github.com/H0llyW00dzZ/pakasir-go-sdk/src/grpc/pakasir/v1;pakasirv1";

// SimulationService provides gRPC access to the Pakasir sandbox simulation API.
//
// This service is only available when the project is in Sandbox mode.
// It triggers the webhook callback as if a real payment was completed.
service SimulationService {
  // Pay simulates a payment for a pending transaction.
  rpc Pay(PayRequest) returns (PayResponse) {}
}

// PayRequest is the request to simulate a payment in sandbox mode.
message PayRequest {
  // order_id is the unique order identifier.
  string order_id = 1;

  // amount is the payment amount in the smallest currency unit.
  int64 amount = 2;
}

// PayResponse is the response after simulating a payment.
message PayResponse {}
